---
project_name: picoclaw
loglevel: info

analyses:
- analysis_name: picoclaw go architecture
  source_directory: /work/source

  only_permit_languages:
  - go

  only_permit_file_extensions:
  - .go

  ignore_directories_containing:
  - .git
  - .idea
  - build
  - dist
  - node_modules
  - vendor

  file_scan:
  - number_of_methods
  - source_lines_of_code
  - dependency_graph
  - louvain_modularity
  - fan_in_out

  export:
  - directory: /work/export
  - graphml
  - json
  - tabular_file
  - tabular_console_overall
  - d3
